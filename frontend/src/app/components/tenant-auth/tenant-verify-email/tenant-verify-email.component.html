<div class="form-inner">

  <div class="form-header">
    <h2>Verify your email</h2>
    <p>Enter the 6-digit code sent to <strong>{{ email() }}</strong></p>
  </div>

  <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label for="tv-otp">Verification code</label>
      <input id="tv-otp" type="text" pInputText formControlName="otp"
        placeholder="000000" maxlength="6" autocomplete="one-time-code"
        inputmode="numeric" class="otp-input" />
      @if (otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched) {
        <small class="error-text">Enter the 6-digit code from your email.</small>
      }
    </div>

    @if (errorMsg()) {
      <div class="error-banner">
        <i class="pi pi-exclamation-circle"></i>{{ errorMsg() }}
      </div>
    }

    @if (successMsg()) {
      <div class="success-banner">
        <i class="pi pi-check-circle"></i>{{ successMsg() }}
      </div>
    }

    <p-button type="submit" label="Verify email" styleClass="tenant-auth-btn"
      [loading]="isLoading()" [disabled]="otpForm.invalid">
    </p-button>

  </form>

  <div class="resend-row">
    <span>Didn't receive it?</span>
    <button type="button" (click)="resendOtp()" [disabled]="isResending()">
      {{ isResending() ? 'Sending…' : 'Resend code' }}
    </button>
  </div>

  <p class="auth-switch">
    <a [routerLink]="loginLink" class="back-link">
      <i class="pi pi-arrow-left"></i> Back to sign in
    </a>
  </p>

</div>
