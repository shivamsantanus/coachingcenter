<div class="form-inner">

  <div class="form-header">
    <h2>Forgot password?</h2>
    <p>Enter your email and we'll send a reset code</p>
  </div>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label for="tfp-email">Email address</label>
      <input id="tfp-email" type="email" pInputText formControlName="email"
        placeholder="you@example.com" autocomplete="email" />
      @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
        <small class="error-text">Enter a valid email address.</small>
      }
    </div>

    @if (errorMsg()) {
      <div class="error-banner">
        <i class="pi pi-exclamation-circle"></i>{{ errorMsg() }}
      </div>
    }

    <p-button type="submit" label="Send reset code"
      [loading]="isLoading()" [disabled]="forgotForm.invalid">
    </p-button>

  </form>

  <p class="auth-switch">
    <a [routerLink]="loginLink" class="back-link">
      <i class="pi pi-arrow-left"></i> Back to sign in
    </a>
  </p>

</div>
