<!-- Forced change-password overlay for first-login users -->
@if (isFirstLogin()) {
  <app-change-password (passwordChanged)="isFirstLogin.set(false)" />
}

<!-- Mobile sidebar backdrop -->
<div
  class="sidebar-overlay"
  [class.sidebar-overlay--visible]="sidebarOpen()"
  (click)="closeSidebar()"
  aria-hidden="true">
</div>

<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar--open]="sidebarOpen()">
    <div class="sidebar-brand">
      <span class="brand-name">ClassNova</span>
      <span class="tenant-name">{{ context?.tenantName }}</span>
    </div>

    <nav class="sidebar-nav">
      @if (!navLoaded()) {
        <div class="nav-skeleton">
          <span class="nav-skeleton__item"></span>
          <span class="nav-skeleton__item"></span>
          <span class="nav-skeleton__item"></span>
        </div>
      } @else {
        @for (item of navItems(); track trackNavItem($index, item)) {
          <a
            [routerLink]="navRoute(item)"
            routerLinkActive="active"
            class="nav-item"
            (click)="closeSidebar()">
            <i class="pi {{ item.icon }}"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Toggle navigation">
          <i class="pi pi-bars"></i>
        </button>
        <a [routerLink]="tenantContext.landingUrl" class="home-link" title="Back to home page">
          <i class="pi pi-home"></i>
        </a>
      </div>
      <div class="header-right">
        <div class="user-info">
          <span class="user-name">{{ context?.fullName }}</span>
          <span class="user-role">{{ context?.role }}</span>
        </div>
        <div class="avatar">
          {{ context?.fullName?.charAt(0) | uppercase }}
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
