<div class="auth-page">
  <div class="auth-card">

    <div class="card-header">
      <div class="header-brand">
        <svg width="28" height="28" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="38" height="38" rx="10" fill="rgba(255,255,255,0.16)"/>
          <path d="M19 8L4 15.5L19 23L34 15.5L19 8Z" fill="white"/>
          <path d="M8 19.5V27C9.5 29.5 13.5 32 19 32C24.5 32 28.5 29.5 30 27V19.5" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="34" y1="15.5" x2="34" y2="23.5" stroke="white" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="34" cy="24" r="1.75" fill="white"/>
        </svg>
        <span>ClassNova</span>
      </div>
    </div>

    <div class="card-body">

      <div class="page-icon">
        <i class="pi pi-envelope"></i>
      </div>

      <div *ngIf="!successMessage">
        <h1 class="page-title">Check your inbox</h1>
        <p class="page-subtitle">
          We sent a 6-digit code to <strong>{{ maskedEmail }}</strong>.
          Enter it below to activate your account.
        </p>

        <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">

          <div class="field">
            <label for="otp">Verification Code</label>
            <input
              id="otp"
              type="text"
              pInputText
              formControlName="otp"
              placeholder="000000"
              maxlength="6"
              autocomplete="one-time-code"
              inputmode="numeric"
              class="otp-input"
              (input)="onOtpInput($event)"
            />
            <small *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched" class="error-text">
              Enter the 6-digit code from your email.
            </small>
          </div>

          <div *ngIf="errorMessage" class="error-banner">
            <i class="pi pi-exclamation-circle"></i>
            {{ errorMessage }}
          </div>

          <p-button
            type="submit"
            label="Verify Email"
            styleClass="auth-btn"
            [loading]="verifying"
            [disabled]="otpForm.invalid">
          </p-button>

        </form>

        <div class="resend-row">
          <span>Didn't receive it?</span>
          <button
            type="button"
            class="resend-btn"
            [disabled]="cooldown > 0 || resending"
            (click)="onResend()">
            {{ resendLabel }}
          </button>
        </div>

        <p class="auth-link">
          <a routerLink="/register">
            <i class="pi pi-arrow-left"></i>
            Back to sign up
          </a>
        </p>
      </div>

      <div *ngIf="successMessage" class="success-banner">
        <i class="pi pi-check-circle"></i>
        {{ successMessage }}
      </div>

    </div>
  </div>
</div>
