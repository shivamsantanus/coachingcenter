<div class="auth-page">
  <div class="auth-card">

    <div class="card-header">
      <div class="header-brand">
        <svg width="28" height="28" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="38" height="38" rx="10" fill="rgba(255,255,255,0.16)"/>
          <path d="M19 8L4 15.5L19 23L34 15.5L19 8Z" fill="white"/>
          <path d="M8 19.5V27C9.5 29.5 13.5 32 19 32C24.5 32 28.5 29.5 30 27V19.5" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="34" y1="15.5" x2="34" y2="23.5" stroke="white" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="34" cy="24" r="1.75" fill="white"/>
        </svg>
        <span>ClassNova</span>
      </div>
    </div>

    <div class="card-body">

      <div class="page-icon">
        <i class="pi pi-lock"></i>
      </div>

      <h1 class="page-title">Forgot your password?</h1>

      <div *ngIf="submitted" class="info-banner">
        <i class="pi pi-check-circle"></i>
        If an account with that email exists, a reset code has been sent. Redirecting&hellip;
      </div>

      <div *ngIf="!submitted">
        <p class="page-subtitle">
          Enter your Organization ID and email — we'll send you a 6-digit reset code.
        </p>

        <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">

          <div class="field">
            <label for="tenantSlug">Organization ID</label>
            <input
              id="tenantSlug"
              type="text"
              pInputText
              formControlName="tenantSlug"
              placeholder="e.g. bright-future"
              autocomplete="organization"
            />
            <small *ngIf="requestForm.get('tenantSlug')?.invalid && requestForm.get('tenantSlug')?.touched" class="error-text">
              Organization ID is required.
            </small>
          </div>

          <div class="field">
            <label for="email">Email address</label>
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <small *ngIf="requestForm.get('email')?.invalid && requestForm.get('email')?.touched" class="error-text">
              Enter a valid email address.
            </small>
          </div>

          <div *ngIf="errorMessage" class="error-banner">
            <i class="pi pi-exclamation-circle"></i>
            {{ errorMessage }}
          </div>

          <p-button
            type="submit"
            label="Send Reset Code"
            styleClass="auth-btn"
            [loading]="loading"
            [disabled]="requestForm.invalid">
          </p-button>

        </form>
      </div>

      <p class="auth-link">
        <a routerLink="/login">
          <i class="pi pi-arrow-left"></i>
          Back to sign in
        </a>
      </p>

    </div>
  </div>
</div>
